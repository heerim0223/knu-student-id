<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강원대 학생증 만들기</title>
  
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="scene" id="scene">
    <div class="left-info">
      <div class="conf-label">
        <span class="badge">KNU</span> student ID
      </div>
      <h1>강원대<br>학생증 만들기</h1>
      <p>웹에 임베드할 수 있는<br>온라인 학생증을 만들어보세요.</p>
      
      <div class="buttons">
        <button class="btn primary">SEE ORIGINAL</button>
        <button class="btn">COPY COMPONENT</button>
      </div>

      <div class="input-row">
        <div class="input-wrap">
          <span class="input-label">이름</span>
          <input class="name-input" id="nameInput" placeholder="홍길동" maxlength="12" />
        </div>
        <div class="input-wrap">
          <span class="input-label">학과</span>
          <input class="name-input" id="deptInput" placeholder="컴퓨터공학과" maxlength="20" />
          <button class="apply-btn" id="applyBtn">적용</button>
        </div>
        <div class="hint">명찰을 드래그해보세요 (마우스 / 터치)</div>
      </div>
    </div>

    <div class="badge-wrap">
      <div class="lanyard"></div>
      <div class="card-3d" id="card">
        <div class="card-face">
          <div class="knu-stripe"></div>
          <div class="knu-stripe-blue"></div>
          <div class="card-content">
            <div class="card-header">
              <div class="knu-logo-wrap">
                <div class="knu-text">
                  <div class="knu-dot"></div>
                  <span class="knu-letters">KNU</span>
                </div>
                <div class="knu-sub"><br>Kangwon<br>National<br>Univ.</div>
              </div>
              <div class="card-date">학 생 증</div>
            </div>
            <div>
              <div class="card-divider"></div>
              <div class="attendee-name" id="cardName">홍길동</div>
              <div class="attendee-type" id="cardDept">학과명</div>
              <div class="card-site">kangwon.ac.kr</div>
            </div>
          </div>
          <div class="seal-wrap">
            <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
              <image href="https://i.namu.wiki/i/C254w8s-QR60mBDUgv_OJiTlf77b44k-UJH5I44KKqU5hdHKNPYw-UrS_nHPToM5GbMdIe66pK9CfcBCebYWew.svg" width="64" height="64"/>
            </svg>
          </div>
          <div class="shine" id="shine"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
